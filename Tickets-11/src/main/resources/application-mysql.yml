spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ticketsdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate