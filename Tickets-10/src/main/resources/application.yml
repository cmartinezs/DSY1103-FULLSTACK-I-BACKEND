spring:
  application:
    name: Tickets
  datasource:
    # H2 en memoria (volátil - se pierde al cerrar la app)
    # Para H2 persistente usar: jdbc:h2:file:./data/tickets_db
    url: jdbc:h2:mem:tickets_db
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: "/ticket-app"

logging:
  level:
    root: INFO
    cl.duoc.fullstack: DEBUG